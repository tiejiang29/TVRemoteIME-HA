name: Build TVRemoteIME HA Edition APK

on:
  # 手动触发
  workflow_dispatch:
  # 推送到 main/master 分支时自动构建
  push:
    branches:
      - main
      - master
  # PR 时构建
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools-version: '34.0.0'
          ndk-version: '26.1.10909125'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Debug - Print project structure
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== settings.gradle ==="
          cat settings.gradle
          echo "=== IMEService/build.gradle ==="
          cat IMEService/build.gradle

      - name: Build Debug APK (first attempt)
        id: build_debug
        continue-on-error: true
        run: ./gradlew :IMEService:assembleDebug --stacktrace --no-daemon

      - name: Build Debug APK (retry with --refresh-dependencies on failure)
        if: steps.build_debug.outcome == 'failure'
        run: ./gradlew :IMEService:assembleDebug --stacktrace --no-daemon --refresh-dependencies

      - name: Build Release APK
        id: build_release
        continue-on-error: true
        run: ./gradlew :IMEService:assembleRelease --stacktrace --no-daemon

      - name: Build Release APK (retry on failure)
        if: steps.build_release.outcome == 'failure'
        run: ./gradlew :IMEService:assembleRelease --stacktrace --no-daemon --refresh-dependencies

      - name: List built APKs
        run: |
          echo "=== Built APKs ==="
          find . -name "*.apk" -type f -exec ls -la {} \;

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVRemoteIME-Debug-APK
          path: |
            IMEService/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVRemoteIME-Release-APK
          path: |
            IMEService/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 90

      - name: Create Release on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            IMEService/build/outputs/apk/release/*.apk
            IMEService/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
